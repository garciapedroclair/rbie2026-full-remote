services:
  api:
    build:
      context: ./server
    ports:
      - "8002:8000"         
    volumes:
      - ./server:/app
      - venv_api:/usr/local/lib/python3.11/site-packages
    networks:
      - app_net

  client:
    build:
      context: ./client
    ports:
      - "3002:3000"          
    volumes:
      - ./client:/app
      - node_modules_client:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
    networks:
      - app_net

  nginx:
    image: nginx:latest
    ports:
      - "82:80"            
    volumes:
      - ./infra/nginx.config:/etc/nginx/conf.d/default.conf:ro
      - poc_nginx:/var/log/nginx
    depends_on:
      - client
      - api
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  node_modules_client:
  venv_api:
  poc_nginx:
